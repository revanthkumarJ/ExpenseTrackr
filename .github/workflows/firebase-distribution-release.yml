# ─────────────────────────────────────────────────────────────────────────────
# Workflow: Build the SIGNED RELEASE APK and ship it to Firebase App Distribution.
#
# Same shape as the debug workflow, with THREE extra things:
#   • decode the release keystore (.jks) from a secret,
#   • recreate androidApp/keystore.properties so Gradle finds the signing config,
#   • run assembleRelease (minified + signed) instead of assembleDebug.
#
# Your androidApp/build.gradle.kts already reads signing from keystore.properties
# and only uses the real key when that file exists — so on CI we just have to put
# that file (and the .jks it points to) back in place.
# ─────────────────────────────────────────────────────────────────────────────

name: Firebase Distribution — Release   # Display name in the GitHub "Actions" tab.

#
# `inputs:` adds form fields to the "Run workflow" dialog. Here we ask you to type
# the release notes each run. You read the typed value later via
# `${{ inputs.<id> }}` (or the older `${{ github.event.inputs.<id> }}`).
on:
  workflow_dispatch:
    inputs:
      releaseNotes:
        description: "Release notes for testers (shown in Firebase)"
        required: true          # you must type something before it will run
        type: string            # a single-line text box
        default: "Bug fixes and improvements"

jobs:
  distribute:
    name: Build & distribute signed release APK
    runs-on: ubuntu-latest
    steps:

      # STEP 1 — Clone your repo onto the blank runner. (Same as debug.)
      - name: Checkout repository
        uses: actions/checkout@v4

      # STEP 2 — Install JDK 17 for AGP 9 / Gradle 9.1. (Same as debug.)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # STEP 3 — Install Gradle + enable dependency caching. (Same as debug.)
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # STEP 4 — Recreate google-services.json from its base64 secret. (Same as debug.)
      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 --decode > androidApp/google-services.json

      # STEP 5 — NEW: Recreate the release keystore (.jks) from a base64 secret.
      # A .jks is a binary file, so — exactly like google-services.json — we stored
      # it base64-encoded and decode it back into androidApp/release.jks here.
      # (Locally you'd generate the secret with:
      #    base64 -i /path/to/your-release.jks | pbcopy   → paste into KEYSTORE_BASE64)
      - name: Recreate release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > androidApp/release.jks

      # STEP 6 — NEW: Recreate androidApp/keystore.properties.
      # build.gradle.kts reads this file to find the key + passwords. `storeFile`
      # is resolved relative to the androidApp module, so `release.jks` points at
      # the file we just wrote in step 5. The three passwords/alias come from
      # secrets. `printf` writes each on its own `key=value` line.
      #   (Secrets are auto-masked in logs, so the passwords won't be printed.)
      - name: Recreate keystore.properties
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          printf 'storeFile=release.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$STORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" > androidApp/keystore.properties

      # STEP 7 — Build the SIGNED RELEASE APK.
      # assembleRelease runs the `release` build type: minify + shrink + sign with
      # the real key (because keystore.properties now exists). Slower than debug.
      # Output: androidApp/build/outputs/apk/release/androidApp-release.apk
      - name: Build release APK
        run: ./gradlew :androidApp:assembleRelease --stacktrace

      # STEP 8 — Upload the signed APK to Firebase App Distribution. (Same action
      # as debug; only the `file:` path changes to the release output.)
      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: revanthTesters
          file: androidApp/build/outputs/apk/release/androidApp-release.apk
          releaseNotes: ${{ inputs.releaseNotes }}   # whatever you typed in the Run dialog
